[defaults]
# Chemin vers l'inventaire (liste des serveurs)
inventory = inventory/hosts.yml

# Désactive la vérification de la clé SSH du serveur distant
# (l'instance Scaleway change à chaque recréation, donc la clé change)
host_key_checking = False

# Utilisateur de connexion par défaut
remote_user = root

# Réduit la verbosité des warnings inutiles
deprecation_warnings = False

# Timeout de connexion SSH (secondes)
timeout = 30

[privilege_escalation]
# Pas besoin de become/sudo puisqu'on se connecte en root
become = False
