[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 25
pm.start_servers = 5
pm.min_spare_servers = 1
pm.max_spare_servers = 10
pm.max_requests = 100

chdir = /

; Permet l'accès aux variables d'environnement dans PHP
; (nécessaire pour que WordPress lise le .env)
clear_env = no
